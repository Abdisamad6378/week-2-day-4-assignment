<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📝 Registration Form</h1>
        
        <form id="registrationForm" class="form-card">
            <!-- Name -->
            <div class="form-group">
                <label for="name">Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="Enter your full name" />
                    <span class="validation-icon" id="nameIcon"></span>
                </div>
                <div class="error-message" id="nameError"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="Enter your email" />
                    <span class="validation-icon" id="emailIcon"></span>
                </div>
                <div class="error-message" id="emailError"></div>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" placeholder="e.g., 0712345678" />
                    <span class="validation-icon" id="phoneIcon"></span>
                </div>
                <div class="error-message" id="phoneError"></div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Min 8 chars, 1 uppercase, 1 number" />
                    <span class="validation-icon" id="passwordIcon"></span>
                </div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" id="submitBtn" disabled>Register</button>
        </form>
    </div>
    <script src="form.js"></script>
</body>
</html>
